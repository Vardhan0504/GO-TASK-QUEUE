services:
  - type: web
    name: go-task-queue
    env: go
    buildCommand: go build -o server ./cmd/server/main.go
    startCommand: ./server
    envVars:
      - key: PORT
        value: 8080
      - key: WORKER_CONCURRENCY
        value: "5"
      - key: REDIS_URL
        sync: false # Set manually in Render dashboard for security